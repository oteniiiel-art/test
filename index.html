<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengadaan Perangkat IT - PT Dexa Arfindo Pratama</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <span class="tb-date" id="tgl-hdr"></span>
    <div class="header">
        <h1>Pengadaan Perangkat IT</h1>
    </div>
    <p class="subtitle">PT Dexa Arfindo Pratama</p>

    <div class="nav-tabs">
        <button class="nav-tab active" onclick="showTab('dashboard')">Dashboard</button>
        <button class="nav-tab" onclick="showTab('input')">Input Data</button>
    </div>

    <!-- TAB DASHBOARD -->
    <div id="dashboard" class="tab-content active">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Cari Instansi, Perangkat, atau Spesifikasi...">
            <button onclick="resetSearch()">Reset</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Instansi</th>
                        <th>Tanggal Pengadaan</th>
                        <th>Perangkat</th>
                        <th>Jumlah</th>
                        <th>Budget</th>
                        <th>Total Budget</th>
                        <th>Spesifikasi</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="9" class="loading">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- TAB INPUT -->
    <div id="input" class="tab-content">
        <form id="pengadaanForm">
            <div class="grid-2">
                <div class="form-group">
                    <label>Nama Rumah Sakit / Instansi</label>
                    <input type="text" name="instansi" required>
                </div>
                <div class="form-group">
                    <label>Tanggal Pengadaan</label>
                    <input type="date" name="tanggal" required>
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Sumber Dana</label>
                    <input type="text" name="sumber_dana" value="PT Dexa Arfindo Pratama" readonly>
                </div>
                <div class="form-group">
                    <label>Vendor/Supplier</label>
                    <input type="text" name="vendor" required>
                </div>
            </div>

            <div class="form-group">
                <label>Jenis Perangkat</label>
                <select name="perangkat" required>
                    <option value="">Pilih perangkat</option>
                    <option>Komputer/Laptop</option>
                    <option>Printer</option>
                    <option>Server</option>
                    <option>Jaringan & Router</option>
                    <option>Monitor</option>
                    <option>Lainnya</option>
                </select>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Merk</label>
                    <input type="text" name="merk" required>
                </div>
                <div class="form-group">
                    <label>Kondisi</label>
                    <select name="kondisi" required>
                        <option value="">Pilih kondisi</option>
                        <option>Baru</option>
                        <option>Bekas</option>
                    </select>
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Jumlah</label>
                    <input type="number" name="jumlah" id="jumlah" min="1" required>
                </div>
                <div class="form-group">
                    <label>Estimasi Budget per Unit</label>
                    <input type="text" name="budget" id="budget" placeholder="Rp...">
                </div>
            </div>

            <div class="form-group">
                <label>Total Estimasi Budget</label>
                <input type="text" name="total_budget" id="total_budget" placeholder="Rp 0" readonly>
            </div>

            <div class="form-group">
                <label>Spesifikasi Detail</label>
                <textarea name="spesifikasi" rows="3" placeholder="Contoh: Intel i5, RAM 8GB, SSD 512GB"></textarea>
            </div>

            <div class="form-group">
                <label>Upload Foto Nota / Bukti Pembayaran</label>
                <input type="file" name="nota" id="nota" accept="image/*,.pdf" required>
                <small style="color:#718096;">Format: JPG, PNG, PDF. Maks 10MB</small>
            </div>

            <button type="submit">Kirim Data Pengadaan</button>
            <div class="success" id="successMsg">Data berhasil dikirim!</div>
        </form>
    </div>
</div>

<!-- Modal Edit -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <h2>Edit Data Pengadaan</h2>
        <form id="editForm">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Instansi</label>
                <input type="text" id="editInstansi" required>
            </div>
            <div class="form-group">
                <label>Tanggal</label>
                <input type="date" id="editTanggal" required>
            </div>
            <div class="form-group">
                <label>Vendor</label>
                <input type="text" id="editVendor" required>
            </div>
            <div class="form-group">
                <label>Perangkat</label>
                <input type="text" id="editPerangkat" required>
            </div>
            <div class="form-group">
                <label>Merk</label>
                <input type="text" id="editMerk" required>
            </div>
            <div class="form-group">
                <label>Kondisi</label>
                <select id="editKondisi" required>
                    <option>Baru</option>
                    <option>Bekas</option>
                </select>
            </div>
            <div class="form-group">
                <label>Jumlah</label>
                <input type="number" id="editJumlah" required>
            </div>
            <div class="form-group">
                <label>Budget per Unit</label>
                <input type="text" id="editBudget" required>
            </div>
            <div class="form-group">
                <label>Spesifikasi</label>
                <textarea id="editSpesifikasi" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Ganti Foto Nota</label>
                <input type="file" id="editNota" name="nota" accept="image/*,.pdf">
                <small style="color:#718096;">Kosongkan kalau tidak mau ganti</small>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-cancel" onclick="closeModal()">Batal</button>
                <button type="submit" class="btn-save">Simpan</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Detail -->
<div class="modal" id="detailModal">
    <div class="modal-content">
        <h2>Detail Data Pengadaan</h2>
        <div id="detailContent"></div>
        <div class="modal-buttons">
            <button type="button" class="btn-cancel" onclick="closeDetail()">Tutup</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
