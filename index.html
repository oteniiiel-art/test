<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengadaan Perangkat IT - PT Dexa Arfindo Pratama</title>
<style>
    * {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', system-ui, sans-serif;}
body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
    min-height: 100vh;
    padding: 30px;
}
.container {
    background: #e8e8e8;
    border-radius: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    max-width: 1400px;
    width: 95%;
    margin: 0 auto;
    padding: 40px 50px;
}
.header {margin-bottom: 10px;}
h1 {
    color: #1a202c;
    font-size: 32px;
    text-align: center;
    font-weight: 700;
}
.subtitle {color: #4a5568; font-size: 15px; margin-bottom: 30px; text-align: center;}
.nav-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 30px;
    border-bottom: 3px solid #cbd5e0;
}
.nav-tab {
    flex: 1;
    padding: 15px 0;
    background: none;
    border: none;
    font-size: 16px;
    font-weight: 600;
    color: #718096;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.3s;
    margin-bottom: -3px;
}
.nav-tab.active {
    color: #3b5fd1;
    border-bottom-color: #3b5fd1;
}
.tab-content {display: none;}
.tab-content.active {display: block;}
.search-bar {
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}
.search-bar input {
    flex:1;
    min-width:250px;
    padding:12px 16px;
    border:2px solid #cbd5e0;
    border-radius:10px;
    font-size:15px;
    background:white;
}
.search-bar button {
    padding:12px 20px;
    background:#cbd5e0;
    color:#4a5568;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
}
.table-wrapper {overflow-x: auto; border-radius: 12px;}
table {width: 100%; border-collapse: collapse; min-width: 1000px;}
thead {
    background: #3b5fd1;
    color: white;
}
th, td {padding: 16px 18px; text-align: left; font-size: 14px;}
th {font-weight: 600; white-space: nowrap;}
tbody {background: white;}
tbody tr {border-bottom: 1px solid #e2e8f0;}
tbody tr:hover {background: #f7fafc;}
.btn-edit,.btn-delete,.btn-detail {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    margin: 3px 0;
    display: block;
    width: 70px;
    text-align: center;
}
.btn-detail {background: #9f7aea; color: white;}
.btn-edit {background: #3b82f6; color: white;}
.btn-delete {background: #ef4444; color: white;}
.loading,.empty {text-align: center; padding: 40px; color: #718096; background: white;}

/* Form styles */
.container {
    position: relative;
    ...
}
   .tb-date {
    position: absolute;
    top: 25px;
    left: 50px;
    color: #4a5568;
    font-size: 14px;
    font-weight: 500;
}
@media (max-width: 600px) {
    .tb-date {
        top: 20px;
        left: 25px;
        font-size: 13px;
    }
}
.grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}
.form-group {margin-bottom: 20px;}
label {
    display: block;
    color: #2d3748;
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 14px;
}
input, select, textarea {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid #cbd5e0;
    border-radius: 10px;
    font-size: 15px;
    background: white;
    transition: all 0.3s;
}
input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #3b5fd1;
    box-shadow: 0 0 0 3px rgba(59, 95, 209, 0.1);
}
input[readonly] {
    background: #f7fafc;
    font-weight: 600;
    color: #2d3748;
}
button[type="submit"] {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #3b5fd1 0%, #2a47a8 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s;
}
button[type="submit"]:hover {transform: translateY(-2px);}
.success {
    display: none;
    background: #c6f6d5;
    color: #22543d;
    padding: 12px;
    border-radius: 10px;
    margin-top: 20px;
    text-align: center;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
    z-index: 1000;
}
.modal-content {
    background: white;
    border-radius: 15px;
    padding: 35px;
    max-width: 750px;
    width: 95%;
    max-height: 95vh;
    overflow-y: auto;
}
.modal h2 {margin-bottom: 20px; color: #2d3748;}
.modal-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}
.btn-save {
    flex: 1;
    padding: 12px;
    background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
}
.btn-cancel {
    flex: 1;
    padding: 12px;
    background: #e2e8f0;
    color: #4a5568;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
}
#detailContent p {margin-bottom: 10px; line-height: 1.6;}
@media (max-width: 600px) {
 .grid-2 {grid-template-columns: 1fr;}
 .container {padding: 25px;}
 .modal-content {
        max-width: 95%;
        padding: 25px;
    }
}
</style>
</head>
<body>
<div class="container">
    <span class="tb-date" id="tgl-hdr"></span>
    <div class="header">
        <h1>Pengadaan Perangkat IT</h1>
    </div>
    <p class="subtitle">PT Dexa Arfindo Pratama</p>

    <div class="nav-tabs">
        <button class="nav-tab active" onclick="showTab('dashboard')">Dashboard</button>
        <button class="nav-tab" onclick="showTab('input')">Input Data</button>
    </div>

    <!-- TAB DASHBOARD -->
    <div id="dashboard" class="tab-content active">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Cari Instansi, Perangkat, atau Spesifikasi...">
            <button onclick="resetSearch()">Reset</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Instansi</th>
                        <th>Tanggal Pengadaan</th>
                        <th>Perangkat</th>
                        <th>Jumlah</th>
                        <th>Budget</th>
                        <th>Total Budget</th>
                        <th>Spesifikasi</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="9" class="loading">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- TAB INPUT -->
    <div id="input" class="tab-content">
        <form id="pengadaanForm">
            <div class="grid-2">
                <div class="form-group">
                    <label>Nama Rumah Sakit / Instansi</label>
                    <input type="text" name="instansi" required>
                </div>
                <div class="form-group">
                    <label>Tanggal Pengadaan</label>
                    <input type="date" name="tanggal" required>
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Sumber Dana</label>
                    <input type="text" name="sumber_dana" value="PT Dexa Arfindo Pratama" readonly>
                </div>
                <div class="form-group">
                    <label>Vendor/Supplier</label>
                    <input type="text" name="vendor" required>
                </div>
            </div>

            <div class="form-group">
                <label>Jenis Perangkat</label>
                <select name="perangkat" required>
                    <option value="">Pilih perangkat</option>
                    <option>Komputer/Laptop</option>
                    <option>Printer</option>
                    <option>Server</option>
                    <option>Jaringan & Router</option>
                    <option>Monitor</option>
                    <option>Lainnya</option>
                </select>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Merk</label>
                    <input type="text" name="merk" required>
                </div>
                <div class="form-group">
                    <label>Kondisi</label>
                    <select name="kondisi" required>
                        <option value="">Pilih kondisi</option>
                        <option>Baru</option>
                        <option>Bekas</option>
                    </select>
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Jumlah</label>
                    <input type="number" name="jumlah" id="jumlah" min="1" required>
                </div>
                <div class="form-group">
                    <label>Estimasi Budget per Unit</label>
                    <input type="text" name="budget" id="budget" placeholder="Rp...">
                </div>
            </div>

            <div class="form-group">
                <label>Total Estimasi Budget</label>
                <input type="text" name="total_budget" id="total_budget" placeholder="Rp 0" readonly>
            </div>

            <div class="form-group">
                <label>Spesifikasi Detail</label>
                <textarea name="spesifikasi" rows="3" placeholder="Contoh: Intel i5, RAM 8GB, SSD 512GB"></textarea>
            </div>

            <div class="form-group">
                <label>Upload Foto Nota / Bukti Pembayaran</label>
                <input type="file" name="nota" id="nota" accept="image/*,.pdf" required>
                <small style="color:#718096;">Format: JPG, PNG, PDF. Maks 10MB</small>
            </div>

            <button type="submit">Kirim Data Pengadaan</button>
            <div class="success" id="successMsg">Data berhasil dikirim!</div>
        </form>
    </div>
</div>

<!-- Modal Edit -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <h2>Edit Data Pengadaan</h2>
        <form id="editForm">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Instansi</label>
                <input type="text" id="editInstansi" required>
            </div>
            <div class="form-group">
                <label>Tanggal</label>
                <input type="date" id="editTanggal" required>
            </div>
            <div class="form-group">
                <label>Vendor</label>
                <input type="text" id="editVendor" required>
            </div>
            <div class="form-group">
                <label>Perangkat</label>
                <input type="text" id="editPerangkat" required>
            </div>
            <div class="form-group">
                <label>Merk</label>
                <input type="text" id="editMerk" required>
            </div>
            <div class="form-group">
                <label>Kondisi</label>
                <select id="editKondisi" required>
                    <option>Baru</option>
                    <option>Bekas</option>
                </select>
            </div>
            <div class="form-group">
                <label>Jumlah</label>
                <input type="number" id="editJumlah" required>
            </div>
            <div class="form-group">
                <label>Budget per Unit</label>
                <input type="text" id="editBudget" required>
            </div>
            <div class="form-group">
                <label>Spesifikasi</label>
                <textarea id="editSpesifikasi" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Ganti Foto Nota</label>
                <input type="file" id="editNota" name="nota" accept="image/*,.pdf">
                <small style="color:#718096;">Kosongkan kalau tidak mau ganti</small>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-cancel" onclick="closeModal()">Batal</button>
                <button type="submit" class="btn-save">Simpan</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Detail -->
<div class="modal" id="detailModal">
    <div class="modal-content">
        <h2>Detail Data Pengadaan</h2>
        <div id="detailContent"></div>
        <div class="modal-buttons">
            <button type="button" class="btn-cancel" onclick="closeDetail()">Tutup</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyyR6KUw_KG2unpue72qxbZPi2WHE2UnMfjbNVojbmQhIpRQHJWry7fwyb066OoNbvU-g/exec';
let allData = [];
let filteredData = [];

// Set tanggal hari ini
function setTanggalHeader() {
    const hari = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
    const bulan = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    const now = new Date();
    
    const tgl = `${hari[now.getDay()]}, ${now.getDate()} ${bulan[now.getMonth()]} ${now.getFullYear()}`;
    const jam = now.toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit',});
    
    document.getElementById('tgl-hdr').textContent = `${tgl} | ${jam}`;
}

// update tiap detik
setTanggalHeader();
setInterval(setTanggalHeader, 1000);

loadData();
function showTab(tab) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    event.target.classList.add('active');
    if(tab === 'dashboard') loadData();
}

function formatRupiah(num) {
    return 'Rp ' + num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function formatTanggal(tgl) {
    if (!tgl) return '-';
    try {
        // Handle berbagai format tanggal
        let date;
        if (typeof tgl === 'string') {
            // Coba parse format ISO (YYYY-MM-DD)
            date = new Date(tgl);
            // Jika hasil Invalid, coba format lain
            if (isNaN(date.getTime())) {
                // Coba format DD/MM/YYYY
                const parts = tgl.split('/');
                if (parts.length === 3) {
                    date = new Date(parts[2], parts[1] - 1, parts[0]);
                } else {
                    return tgl; // Return original jika tidak bisa parse
                }
            }
        } else {
            date = new Date(tgl);
        }
        
        return isNaN(date.getTime()) ? '-' : date.toLocaleDateString('id-ID');
    } catch (e) {
        return tgl || '-';
    }
}

function handleData(res) {
    allData = res.data;
    filteredData = [...allData];
    renderTable();
}

function renderTable() {
    const tbody = document.getElementById('tableBody');

    if(filteredData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty">Data tidak ditemukan</td></tr>';
        return;
    }

    tbody.innerHTML = filteredData.map((row, i) => `
        <tr>
            <td>${i + 1}</td>
            <td>${row.instansi || '-'}</td>
            <td>${formatTanggal(row.tanggal)}</td>
            <td>${row.perangkat || '-'}</td>
            <td>${row.jumlah || 0}</td>
            <td>${formatRupiah(row.budget / row.jumlah || 0)}</td>
            <td>${formatRupiah(row.budget)}</td>
            <td style="max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${row.spesifikasi || '-'}">${row.spesifikasi || '-'}</td>
            <td>
                <button class="btn-detail" onclick="openDetail(${row.id})">Detail</button>
                <button class="btn-edit" onclick="openEdit(${row.id})">Edit</button>
            </td>
        </tr>
    `).join('');
}

function loadData() {
    const script = document.createElement('script');
    script.src = SCRIPT_URL + '?callback=handleData';
    document.body.appendChild(script);
}

// Fitur pencarian
document.getElementById('searchInput').addEventListener('input', function(e) {
    const keyword = e.target.value.toLowerCase();
    filteredData = allData.filter(row =>
        (row.instansi || '').toLowerCase().includes(keyword) ||
        (row.perangkat || '').toLowerCase().includes(keyword) ||
        (row.spesifikasi || '').toLowerCase().includes(keyword)
    );
    renderTable();
});

function resetSearch() {
    document.getElementById('searchInput').value = '';
    filteredData = [...allData];
    renderTable();
}

function openDetail(id) {
    const data = allData.find(d => d.id == id);
    if(!data) return;

    document.getElementById('detailContent').innerHTML = `
        <p><strong>Instansi:</strong> ${data.instansi}</p>
        <p><strong>Tanggal Pengadaan:</strong> ${formatTanggal(data.tanggal)}</p>
        <p><strong>Perangkat:</strong> ${data.perangkat}</p>
        <p><strong>Merk:</strong> ${data.merk}</p>
        <p><strong>Kondisi:</strong> ${data.kondisi}</p>
        <p><strong>Jumlah:</strong> ${data.jumlah}</p>
        <p><strong>Budget/Unit:</strong> ${formatRupiah(data.budget / data.jumlah || 0)}</p>
        <p><strong>Total Budget:</strong> ${formatRupiah(data.budget)}</p>
        <p><strong>Spesifikasi:</strong> ${data.spesifikasi || '-'}</p>
        <p><strong>Nota:</strong> ${data.nota? `<a href="${data.nota}" target="_blank">Lihat Nota</a>` : '-'}</p>
    `;
    document.getElementById('detailModal').style.display = 'flex';
}

function closeDetail() {
    document.getElementById('detailModal').style.display = 'none';
}

function openEdit(id) {
    const data = allData.find(d => d.id == id);
    if(!data) return;

    document.getElementById('editId').value = id;
    document.getElementById('editInstansi').value = data.instansi;
    // Parse tanggal dengan format flexible
    let tanggalValue = '';
    if (data.tanggal) {
        try {
            const date = new Date(data.tanggal);
            if (!isNaN(date.getTime())) {
                tanggalValue = date.toISOString().split('T')[0];
            } else if (typeof data.tanggal === 'string' && /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.test(data.tanggal)) {
                const parts = data.tanggal.split('/');
                tanggalValue = `${parts[2]}-${String(parts[1]).padStart(2, '0')}-${String(parts[0]).padStart(2, '0')}`;
            }
        } catch (e) {
            tanggalValue = '';
        }
    }
    document.getElementById('editTanggal').value = tanggalValue;
    document.getElementById('editVendor').value = '';
    document.getElementById('editPerangkat').value = data.perangkat;
    document.getElementById('editMerk').value = data.merk;
    document.getElementById('editKondisi').value = data.kondisi;
    document.getElementById('editJumlah').value = data.jumlah;
    document.getElementById('editBudget').value = formatRupiah(data.budget / data.jumlah || 0);
    document.getElementById('editSpesifikasi').value = data.spesifikasi;

    document.getElementById('editModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('editModal').style.display = 'none';
}

document.getElementById('editForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData();
    formData.append('action', 'update');
    formData.append('id', document.getElementById('editId').value);
    formData.append('instansi', document.getElementById('editInstansi').value);
    formData.append('tanggal', document.getElementById('editTanggal').value);
    formData.append('vendor', document.getElementById('editVendor').value);
    formData.append('perangkat', document.getElementById('editPerangkat').value);
    formData.append('merk', document.getElementById('editMerk').value);
    formData.append('kondisi', document.getElementById('editKondisi').value);
    formData.append('jumlah', document.getElementById('editJumlah').value);
    formData.append('budget', document.getElementById('editBudget').value);
    formData.append('spesifikasi', document.getElementById('editSpesifikasi').value);

    const notaFile = document.getElementById('editNota').files[0];
    if (notaFile) formData.append('nota', notaFile);

    fetch(SCRIPT_URL, {method: 'POST', body: formData, mode: 'no-cors'})
.then(() => {
        alert('Data berhasil diupdate');
        closeModal();
        loadData();
    });
});

function deleteData(id) {
    if(confirm('Yakin mau hapus data ini?')) {
        const formData = new FormData();
        formData.append('action', 'delete');
        formData.append('id', id);
        fetch(SCRIPT_URL, {method: 'POST', body: formData, mode: 'no-cors'})
 .then(() => {
            alert('Data berhasil dihapus');
            loadData();
        });
    }
}

const jumlah = document.getElementById('jumlah');
const budget = document.getElementById('budget');
const total = document.getElementById('total_budget');

function parseRupiah(str) {
    return parseInt(str.replace(/[^\d]/g, '')) || 0;
}

function hitungTotal() {
    let jml = parseInt(jumlah.value) || 0;
    let bgt = parseRupiah(budget.value);
    total.value = formatRupiah(jml * bgt);
}

budget.addEventListener('input', function(e) {
    e.target.value = formatRupiah(e.target.value);
    hitungTotal();
});
jumlah.addEventListener('input', hitungTotal);

document.getElementById('pengadaanForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.querySelector('#pengadaanForm button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Mengirim...';

    const formData = new FormData(this);

    fetch(SCRIPT_URL, {
        method: 'POST',
        body: formData,
        mode: 'no-cors'
    }).then(() => {
        document.getElementById('successMsg').style.display = 'block';
        this.reset();
        total.value = '';
        btn.disabled = false;
        btn.textContent = 'Kirim Data Pengadaan';
        setTimeout(() => {
            document.getElementById('successMsg').style.display = 'none';
        }, 3000);
    }).catch(() => {
        alert('Gagal kirim data');
        btn.disabled = false;
        btn.textContent = 'Kirim Data Pengadaan';
    });
});

loadData();
</script>
</body>
</html>
